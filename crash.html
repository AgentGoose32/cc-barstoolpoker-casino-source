<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Crash - Fantasy Casino</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        body {
            background: #2a2416 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><defs><pattern id="stone" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse"><rect width="50" height="50" fill="%232a2416"/><rect x="0" y="0" width="49" height="49" fill="%232a2416" stroke="%231a1410" stroke-width="1"/><circle cx="25" cy="25" r="15" fill="%23322a1e" opacity="0.3"/></pattern></defs><rect width="100" height="100" fill="url(%23stone)"/></svg>');
            color: #d4af37;
            font-family: 'Georgia', 'Garamond', serif;
        }

        #container {
            display: flex;
            flex-direction: row;
            height: 100vh;
            gap: 12px;
            padding: 15px;
            background: #000000;
        }

        #gameArea {
            flex: 1;
            position: relative;
            background: 
                #000000;
            border: 6px solid;
            border-color: #8b8070 #3a3020 #3a3020 #8b8070;
            border-radius: 2px;
            overflow: hidden;
            box-shadow: 
                inset 2px 2px 5px rgba(0, 0, 0, 0.8),
                inset -2px -2px 5px rgba(0, 0, 0, 0.8),
                0 0 40px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }



        .fog {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: radial-gradient(ellipse at 50% 100%, rgba(50, 40, 20, 0.5), transparent);
            animation: fogRoll 10s infinite;
        }

        @keyframes fogRoll {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(20px); }
        }

        #sidebar {
            width: 320px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden;
            flex-shrink: 0;
            padding: 0;
        }

        .panel {
            background: #0a0a0a;
            border: 4px solid;
            border-color: #8b8070 #2a2410 #2a2410 #8b8070;
            border-radius: 1px;
            padding: 6px;
            box-shadow: 
                inset 2px 2px 3px rgba(0, 0, 0, 0.5),
                inset -2px -2px 3px rgba(0, 0, 0, 0.5),
                0 0 15px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-title {
            font-family: 'Georgia', 'Garamond', serif;
            font-size: 10px;
            font-weight: 700;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
            border-bottom: 1px solid #3a3020;
            border-top: 1px solid #8b8070;
            padding: 2px 0;
            flex-shrink: 0;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 2px 0;
            font-size: 10px;
            flex-shrink: 0;
        }

        .stat-label {
            color: #a89060;
        }

        .stat-value {
            font-weight: 700;
            color: #d4af37;
            font-family: 'Georgia', 'Garamond', serif;
        }

        .multiplier-display {
            text-align: center;
            margin: 2px 0;
            border: 3px solid #d4af37;
            border-radius: 1px;
            padding: 4px 3px;
            background: #0a0a0a;
            box-shadow: 
                inset 1px 1px 2px rgba(0, 0, 0, 0.8),
                0 0 25px rgba(212, 175, 55, 0.4);
            flex-shrink: 0;
        }

        .multiplier-value {
            font-family: 'Georgia', 'Garamond', serif;
            font-size: 28px;
            font-weight: 900;
            color: #d4af37;
            text-shadow: 
                2px 2px 0 rgba(0, 0, 0, 0.8),
                0 0 30px rgba(212, 175, 55, 0.9),
                0 0 60px rgba(212, 175, 55, 0.5);
            animation: none;
            line-height: 1;
        }

        .multiplier-value.pulse {
            animation: multiplierPulse 0.4s ease-out;
        }

        @keyframes multiplierPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.8), 0 0 40px rgba(212, 175, 55, 1), 0 0 80px rgba(212, 175, 55, 0.7); }
            100% { transform: scale(1); }
        }

        .bet-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            margin-bottom: 4px;
            flex-shrink: 0;
        }

        .bet-btn {
            padding: 4px 2px;
            background: #0a0a0a;
            border: 2px solid;
            border-color: #8b8070 #2a2410 #2a2410 #8b8070;
            color: #d4af37;
            border-radius: 1px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            transition: all 0.15s;
            font-family: 'Georgia', serif;
            box-shadow: inset 1px 1px 1px rgba(0, 0, 0, 0.6);
            flex-shrink: 0;
        }

        .bet-btn:hover {
            background: #0a0a0a;
            box-shadow: inset 1px 1px 1px rgba(0, 0, 0, 0.4);
        }

        .bet-btn:active {
            border-color: #2a2410 #8b8070 #8b8070 #2a2410;
            box-shadow: inset 2px 2px 2px rgba(0, 0, 0, 0.8);
        }

        .input-group {
            display: flex;
            gap: 4px;
            margin: 2px 0;
            flex-shrink: 0;
        }

        input[type="number"] {
            flex: 1;
            padding: 4px 3px;
            background: #3a3020;
            border: 2px solid;
            border-color: #2a2410 #8b8070 #8b8070 #2a2410;
            color: #d4af37;
            border-radius: 1px;
            font-family: 'Georgia', serif;
            font-size: 10px;
            box-shadow: inset 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        input[type="number"]::placeholder {
            color: #7a7060;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #d4af37 #2a2410 #2a2410 #d4af37;
            box-shadow: inset 1px 1px 2px rgba(0, 0, 0, 0.5), 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .primary-btn {
            padding: 6px 8px;
            background: repeating-linear-gradient(90deg, #d4af37, #d4af37 1px, #c9a030 1px, #c9a030 2px);
            border: 2px solid;
            border-color: #8b8070 #2a2410 #2a2410 #8b8070;
            color: #1a1410;
            border-radius: 1px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Georgia', serif;
            font-size: 10px;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.3), 0 0 15px rgba(212, 175, 55, 0.4);
            flex-shrink: 0;
        }

        .primary-btn:hover {
            box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.4), 0 0 25px rgba(212, 175, 55, 0.6);
        }

        .primary-btn:active {
            border-color: #2a2410 #8b8070 #8b8070 #2a2410;
            box-shadow: inset 2px 2px 2px rgba(0, 0, 0, 0.4);
        }

        .primary-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .cashout-btn {
            width: 100%;
            padding: 8px 6px;
            background: repeating-linear-gradient(90deg, #a01a1a, #a01a1a 1px, #8b1414 1px, #8b1414 2px);
            border: 2px solid;
            border-color: #d4614a #2a1410 #2a1410 #d4614a;
            color: #fff;
            border-radius: 1px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Georgia', serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.15s;
            margin-top: 2px;
            box-shadow: inset 1px 1px 0 rgba(255, 100, 100, 0.2), 0 0 20px rgba(160, 26, 26, 0.4);
            flex-shrink: 0;
        }

        .cashout-btn:hover:not(:disabled) {
            background: repeating-linear-gradient(90deg, #b02a2a, #b02a2a 1px, #9b2424 1px, #9b2424 2px);
            box-shadow: inset 1px 1px 0 rgba(255, 100, 100, 0.3), 0 0 30px rgba(160, 26, 26, 0.7);
        }

        .cashout-btn:active {
            border-color: #2a1410 #d4614a #d4614a #2a1410;
            box-shadow: inset 2px 2px 2px rgba(0, 0, 0, 0.6);
        }

        .cashout-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .cashout-btn.pulse-urgent {
            animation: pulseUrgent 0.5s infinite;
        }

        @keyframes pulseUrgent {
            0%, 100% { box-shadow: inset 1px 1px 0 rgba(255, 100, 100, 0.2), 0 0 20px rgba(160, 26, 26, 0.6); }
            50% { box-shadow: inset 1px 1px 0 rgba(255, 100, 100, 0.4), 0 0 40px rgba(160, 26, 26, 1); }
        }

        .history {
            display: flex;
            gap: 3px;
            margin: 2px 0;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .history-chip {
            min-width: 52px;
            height: 34px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            font-size: 13px;
            font-weight: 700;
            color: #16100c;
            border: 2px solid rgba(255,255,255,0.35);
            font-family: 'Georgia', serif;
            flex-shrink: 0;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.16);
            letter-spacing: 0.2px;
        }

        .history-chip.high {
            background: linear-gradient(135deg, #9ef0b2 0%, #5fdb84 58%, #2eaf63 100%);
            border-color: #dafbe3;
            color: #0f2416;
        }

        .history-chip.mid {
            background: linear-gradient(135deg, #ffe58d 0%, #ffd14c 58%, #dfa423 100%);
            border-color: #fff2be;
            color: #2d1d06;
        }

        .history-chip.low {
            background: linear-gradient(135deg, #ffaca3 0%, #ff7a6f 58%, #de4f4a 100%);
            border-color: #ffd2cc;
            color: #2b0e0c;
        }

        .crash-flash {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle, rgba(255,220,180,0.9) 0%, rgba(255,90,90,0.45) 38%, rgba(255,0,0,0) 75%);
            opacity: 0;
            z-index: 30;
        }

        .crash-flash.show {
            animation: crashFlash 650ms ease-out forwards;
        }

        @keyframes crashFlash {
            0% { opacity: 0; }
            15% { opacity: 1; }
            100% { opacity: 0; }
        }

        .screen-shake {
            animation: screenShake 550ms ease-in-out;
        }

        @keyframes screenShake {
            0%, 100% { transform: translate(0,0); }
            20% { transform: translate(-8px, 4px); }
            40% { transform: translate(8px, -4px); }
            60% { transform: translate(-6px, -2px); }
            80% { transform: translate(6px, 3px); }
        }

        .cashout-win {
            background: linear-gradient(135deg, rgba(255,236,150,0.28), rgba(89,214,124,0.24));
            border-radius: 8px;
            padding: 2px 6px;
            box-shadow: 0 0 14px rgba(89,214,124,0.25);
        }

        .cashout-button-win {
            animation: cashoutPulse 700ms ease-out 2;
        }

        @keyframes cashoutPulse {
            0% { filter: drop-shadow(0 0 0 rgba(255,235,140,0)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 18px rgba(255,235,140,0.95)); transform: scale(1.06); }
            100% { filter: drop-shadow(0 0 0 rgba(255,235,140,0)); transform: scale(1); }
        }

        .players-feed {
            flex: 1;
            text-shadow: 0 1px 2px rgba(0,0,0,0.95);
        }

        .player-action {
            display: grid;
            grid-template-columns: minmax(58px, 1fr) 58px 88px minmax(62px, auto);
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            padding: 4px 8px;
            background: rgba(18,12,8,0.78);
            border: 1px solid rgba(214,184,124,0.18);
            border-radius: 6px;
            color: #f3e7c9;
            font: 700 12px Georgia, serif;
            line-height: 1.2;
        }

        .player-action .name {
            color: #fff3cf;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-action .mult {
            color: #8fd6ff;
            text-align: center;
            white-space: nowrap;
        }

        .player-action .cashout-text {
            color: #eadfbe;
            opacity: 0.95;
            text-align: center;
            white-space: nowrap;
        }

        .player-action .loss-text {
            color: #ffb7b7;
            opacity: 0.95;
            text-align: center;
            white-space: nowrap;
        }

        .player-action .amount {
            color: #9df0a8;
            font-weight: 700;
            text-align: right;
            white-space: nowrap;
        }

        .player-action-loss {
            grid-template-columns: minmax(58px, 1fr) 88px minmax(62px, auto);
            background: rgba(45, 12, 12, 0.82);
            border-color: rgba(255, 120, 120, 0.18);
        }

        .player-action-loss .amount {
            color: #ff9a9a;
        }

        .players-feed {
            overflow-y: auto;
            font-size: 9px;
            min-height: 40px;
            scrollbar-width: thin;
            scrollbar-color: #6a6250 #3a3020;
        }
        
        .players-feed::-webkit-scrollbar {
            width: 4px;
        }
        
        .players-feed::-webkit-scrollbar-track {
            background: #3a3020;
        }
        
        .players-feed::-webkit-scrollbar-thumb {
            background: #6a6250;
        }

        .player-action {
            padding: 2px 0;
            border-bottom: 1px solid #3a3020;
            color: #9a8070;
            font-family: 'Georgia', serif;
            line-height: 1.1;
            flex-shrink: 0;
        }

        .player-action .name {
            color: #d4af37;
            font-weight: 700;
        }

        .player-action .amount {
            color: #e4c957;
            font-weight: 700;
        }

        .status-text {
            text-align: center;
            font-size: 11px;
            margin: 2px 0;
            min-height: 14px;
            font-family: 'Georgia', serif;
            flex-shrink: 0;
        }

        .status-betting {
            color: #c9a030;
            font-weight: 700;
        }

        .status-running {
            color: #d4af37;
            font-weight: 700;
        }

        .status-crashed {
            color: #a01a1a;
            font-weight: 700;
        }

        .countdown {
            font-family: 'Georgia', serif;
            font-size: 20px;
            font-weight: 900;
            color: #d4af37;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.8), 0 0 20px rgba(212, 175, 55, 0.6);
            text-align: center;
            margin: 1px 0;
            line-height: 1;
            flex-shrink: 0;
        }

        .game-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Georgia', serif;
            font-size: 72px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            pointer-events: none;
            z-index: 1000;
            display: none;
        }

        .game-message.show {
            display: block;
            animation: messageAppear 0.6s ease-out;
        }

        @keyframes messageAppear {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
        }

        .message-victory {
            color: #d4af37;
            text-shadow: 
                3px 3px 0 rgba(0, 0, 0, 0.9),
                0 0 50px rgba(212, 175, 55, 1),
                0 0 100px rgba(212, 175, 55, 0.8);
        }

        .message-crash {
            color: #c41e3a;
            text-shadow: 
                3px 3px 0 rgba(0, 0, 0, 0.9),
                0 0 50px rgba(196, 30, 58, 1),
                0 0 100px rgba(196, 30, 58, 0.8);
        }

        .seed-display {
            background: #3a3020;
            border: 2px solid;
            border-color: #2a2410 #8b8070 #8b8070 #2a2410;
            padding: 3px;
            border-radius: 1px;
            font-size: 8px;
            color: #7a7060;
            word-break: break-all;
            font-family: 'Georgia', monospace;
            margin: 1px 0;
            box-shadow: inset 1px 1px 2px rgba(0, 0, 0, 0.5);
            line-height: 1.1;
            flex-shrink: 0;
            max-height: 40px;
            overflow-y: auto;
        }

        .scroll-area {
            scrollbar-width: thin;
            scrollbar-color: #6a6250 #3a3020;
        }

        .scroll-area::-webkit-scrollbar {
            width: 6px;
        }

        .scroll-area::-webkit-scrollbar-track {
            background: #3a3020;
        }

        .scroll-area::-webkit-scrollbar-thumb {
            background: #6a6250;
            border-radius: 1px;
        }

        @media (max-width: 1200px) {
            #container {
                flex-direction: column;
            }

            #sidebar {
                width: 100%;
                height: auto;
                max-height: none;
            }

            .multiplier-value {
                font-size: 36px;
            }
        }

        /* UO-style sparkles and rune effects */
        @keyframes runeGlow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        @keyframes sparkleFloat {
            0% { transform: translateY(0) translateX(0); opacity: 1; }
            100% { transform: translateY(-50px) translateX(20px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="gameArea">
            <canvas id="gameCanvas"></canvas>
            <div class="fog"></div>
            <div id="crashFlash" class="crash-flash"></div>
            <div class="game-message" id="gameMessage"></div>
            <div id="gameActionBar" style="display:none;position:absolute;top:82%;left:50%;width:420px;transform:translate(-50%,-50%);z-index:20;align-items:center;gap:8px;pointer-events:auto;">
                <div style="flex:1;min-width:0;background:rgba(0,0,0,0.78);border:1px solid #8b6914;border-radius:4px;padding:10px 12px;text-align:center;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:72px;">
                    <div id="payoutMult" style="font:bold 22px Georgia,serif;color:#ffffff;line-height:1;">1.00x</div>
                    <div id="payoutAmt" style="font:bold 15px Georgia,serif;color:#4ade80;line-height:1.2;margin-top:2px;">+ 0 coins</div>
                </div>
                <button id="cashOutBtn" onclick="cashout()" style="width:210px;height:72px;padding:0;background:url('./cashout_button.svg?v=3') center/contain no-repeat;color:transparent;font:0/0 a;border:none;border-radius:0;cursor:pointer;box-shadow:none;">Cash Out</button>
            </div>
        </div>

        <div id="sidebar" style="position:fixed;left:83.1%;top:0%;width:326px;transform:scale(0.97);transform-origin:top left;z-index:10;flex-shrink:0;">
            <!-- Sidebar image as full background -->
            <img src="./sidebar3.png?v=1" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:fill;pointer-events:none;z-index:0;" />

            <!-- Overlaid interactive elements -->
            <div style="position:relative;z-index:1;padding:0;height:100%;">

                <!-- Status values -->
                <div id="statusText" style="display:none;"></div>
                <div id="countdownText" style="display:none;"></div>
                <div id="balanceValue" style="position:absolute;top:4.7%;left:42%;font:bold 23px Georgia,serif;color:#ffd700;transform:scale(1.36);transform-origin:top left;">50000</div>
                <div id="currentBetValue" style="position:absolute;top:8.3%;left:44.2%;font:bold 23px Georgia,serif;color:#ffffff;transform:scale(1.35);transform-origin:top left;">0</div>
                <div id="winningsValue" style="display:none;"></div>

                <!-- Top countdown bar -->
                <div id="topBarBlock" style="position:absolute;top:0.2%;left:18%;width:76.88%;height:4.31%;display:flex;align-items:center;justify-content:center;gap:18px;z-index:7;border:none;background:transparent;box-shadow:none;cursor:default;user-select:none;">
                    <div class="multiplier-value" id="multiplierValue" style="font-size:22px;white-space:nowrap;">1.00x</div>
                    <div id="nextRoundCountdown" style="font:bold 16px Georgia,serif;color:#e7d6b0;text-shadow:0 1px 2px rgba(0,0,0,0.9);letter-spacing:0.5px;white-space:nowrap;">Next round in 8s</div>
                    </div>

                <!-- Chip bet buttons -->
                <div id="chipBar" style="position:absolute;top:28.5%;left:4%;transform:scale(1.05);transform-origin:top left;width:92%;display:flex;gap:6px;justify-content:center;align-items:center;z-index:5;">
                    <button onclick="setBetAmount(100)" style="background:none;border:none;padding:0;cursor:pointer;">
                        <img src="./chip_100.png?v=1" style="width:48px;height:48px;transition:transform 0.1s;" onmouseover="this.style.transform='scale(1.15)'" onmouseout="this.style.transform='scale(1)'">
                    </button>
                    <button onclick="setBetAmount(500)" style="background:none;border:none;padding:0;cursor:pointer;">
                        <img src="./chip_500.png?v=1" style="width:48px;height:48px;transition:transform 0.1s;" onmouseover="this.style.transform='scale(1.15)'" onmouseout="this.style.transform='scale(1)'">
                    </button>
                    <button onclick="setBetAmount(1000)" style="background:none;border:none;padding:0;cursor:pointer;">
                        <img src="./chip_1000.png?v=1" style="width:48px;height:48px;transition:transform 0.1s;" onmouseover="this.style.transform='scale(1.15)'" onmouseout="this.style.transform='scale(1)'">
                    </button>
                    <button onclick="setBetAmount(5000)" style="background:none;border:none;padding:0;cursor:pointer;">
                        <img src="./chip_5000.png?v=1" style="width:48px;height:48px;transition:transform 0.1s;" onmouseover="this.style.transform='scale(1.15)'" onmouseout="this.style.transform='scale(1)'">
                    </button>
                    <button onclick="setBetAmount(10000)" style="background:none;border:none;padding:0;cursor:pointer;">
                        <img src="./chip_10000.png?v=1" style="width:48px;height:48px;transition:transform 0.1s;" onmouseover="this.style.transform='scale(1.15)'" onmouseout="this.style.transform='scale(1)'">
                    </button>
                </div>
                <!-- Bet input + confirm -->
                <div id="betInputWrap" style="position:absolute;top:34%;left:8%;">
                <input type="number" id="betInput"  placeholder="Amount" min="0.1" step="0.1"
                    style="width:130px;padding:6px;background:rgba(0,0,0,0.7);border:1px solid #8b6914;border-radius:4px;color:#ffd700;font:14px Georgia,serif;text-align:center;" />
                </div>
                <button id="confirmBetBtn" onclick="confirmBet()" aria-label="Confirm Bet" title="Confirm Bet"
                    style="position:absolute;top:41%;left:8%;width:84%;height:40px;padding:0;background:transparent;color:#f7e7a8;font:bold 18px Georgia,serif;letter-spacing:1px;text-shadow:0 1px 2px rgba(0,0,0,0.9),0 0 6px rgba(0,0,0,0.65);border:none;border-radius:4px;cursor:pointer;box-shadow:none;appearance:none;-webkit-appearance:none;z-index:3;display:flex;align-items:center;justify-content:center;">CONFIRM</button>

                <!-- Auto cashout rebuilt -->
                <div id="autoCashoutBlock" style="position:absolute;top:47.11%;left:2.17%;width:42.28%;height:3.37%;z-index:6;display:block;border:none;background:transparent;box-shadow:none;cursor:default;user-select:none;">
                    <input type="number" id="autoCashoutInput" placeholder="" min="1.01" step="0.01"
                        style="position:absolute;left:0;top:50%;transform:translateY(-50%);width:100%;height:100%;padding:0 6px;background:transparent;border:none;border-radius:0;color:#e7d6b0;font:14px Georgia,serif;box-shadow:none;text-align:center;outline:none;cursor:text;" />
                    
                </div>


                <!-- History -->
                <div id="historyBlock" style="position:absolute;top:13.43%;left:23.34%;width:72.04%;height:4.68%;z-index:6;display:block;border:none;background:transparent;box-shadow:none;cursor:default;user-select:none;">
                    <div class="history" id="historyContainer"
                        style="position:absolute;top:8%;left:0;width:100%;height:92%;overflow-y:auto;font:11px Georgia,serif;color:#ccc;"></div>
                    
                </div>


                <!-- Players feed -->
                <div id="playersFeedBlock" style="position:absolute;top:57.64%;left:4.93%;width:89.83%;height:40%;z-index:6;display:block;border:none;background:transparent;box-shadow:none;cursor:default;user-select:none;">
                    <div class="players-feed" id="playersFeed"
                        style="position:absolute;top:0;left:0;width:100%;height:100%;overflow-y:auto;font:11px Georgia,serif;color:#ccc;"></div>
                    
                </div>


                <!-- Hidden cashout button (kept for JS compatibility) -->
                <button id="cashoutBtn" onclick="cashout()" disabled style="display:none;"></button>
            </div>
        </div>

    <script>
// Platform/bolt debugger init -- set BEFORE game script runs
window._platX = 0.780;
window._platY = 1.000;
window._platH = 0.600;
window._wheelPctX = 0.310;
window._wheelPctY = 0.055;
window._boltScale = 0.110;
window._wheelX = null;
window._wheelY = null;
window._barrelTipWorldX = null;
window._barrelTipWorldY = null;
window._bgPanX = 0.24;
window._bgPanY = 0.85;
window._bgDebugScale = 1.00;
</script>
<script>
        // Game State
        let gameState = {
            balance: 50000,
            currentBet: 0,
            roundBet: 0,
            autoCashoutTarget: null,
            multiplier: 1.0,
            isRunning: false,
            isBetting: false,
            crashed: false,
            bettingPhaseTime: 8,
            bettingCountdown: 8,
            gameStartTime: 0,
            crashPoint: 0,
            seed: '',
            history: [],
            winnings: 0,
            cashedOut: false
        };

        // Dragon and Canvas
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Dragon sprite preloader
        const dragonFrames = [];
        let dragonFramesLoaded = 0;
        const DRAGON_FRAME_COUNT = 48;
        for (let i = 1; i <= DRAGON_FRAME_COUNT; i++) {
            const img = new Image();
            img.onload = () => { dragonFramesLoaded++; };
            img.src = `./dragon_locked/frame${String(i).padStart(2,'0')}.png?v=1`;
            dragonFrames.push(img);
        }
        let dragonFrameIndex = 0;
        let dragonFrameTimer = 0;
        let particles = [];
        let trail = [];

        // Responsive canvas sizing with ResizeObserver
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        resizeCanvas();
        
        // Use ResizeObserver for better responsiveness
        const resizeObserver = new ResizeObserver(() => {
            resizeCanvas();
        });
        resizeObserver.observe(canvas.parentElement);
        
        window.addEventListener('resize', resizeCanvas);

        // Provably Fair RNG
        function generateSeed() {
            return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        }

        function crashPointFromSeed(seed) {
            // Hash seed to float 0-1
            let hash = 0;
            for (let i = 0; i < seed.length; i++) {
                const char = seed.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            const h = Math.abs(hash) / 2147483647;
            // Standard crash formula -- 97% RTP (3% house edge)
            // P(survive to 2x) = 48.5%, P(survive to 3x) = 32%, etc.
            // crash = 97 / (1 - h), capped at 1.00x minimum
            const crash = Math.floor(97 / (1 - h)) / 100;
            return Math.max(1.00, crash);
        }

        // Dragon Drawing - Ultima Online Style (angular, pixelated, classic 90s fantasy art)
        function drawDragon(x, y, scale = 1, wingFlap = 0) {
            // Use real 3D rendered sprite if loaded
            if (dragonFramesLoaded >= DRAGON_FRAME_COUNT) {
                dragonFrameTimer++;
                if (dragonFrameTimer >= 2) {
                    dragonFrameTimer = 0;
                    dragonFrameIndex = (dragonFrameIndex + 1) % DRAGON_FRAME_COUNT;
                }
                const frame = dragonFrames[dragonFrameIndex];
                // Locked: frames already flipped/rotated/-30deg/71% scale
                const w = frame.naturalWidth || 568;
                const h = frame.naturalHeight || 398;
                ctx.save();
                ctx.translate(x, y);
                ctx.drawImage(frame, -w / 2, -h / 2, w, h);
                ctx.restore();
                return;
            }

            // Fallback: canvas-drawn dragon
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);

            // Main body - more angular and dragon-like
            ctx.fillStyle = '#4a2a3a';
            ctx.beginPath();
            ctx.moveTo(-25, -8);
            ctx.lineTo(-10, -15);
            ctx.lineTo(15, -15);
            ctx.lineTo(30, -8);
            ctx.lineTo(25, 5);
            ctx.lineTo(0, 10);
            ctx.lineTo(-20, 8);
            ctx.closePath();
            ctx.fill();

            // Body outline
            ctx.strokeStyle = '#2a1a2a';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Dorsal spikes along back
            ctx.fillStyle = '#d4af37';
            for (let i = -20; i <= 20; i += 8) {
                ctx.beginPath();
                ctx.moveTo(i, -15);
                ctx.lineTo(i - 3, -25);
                ctx.lineTo(i + 3, -25);
                ctx.closePath();
                ctx.fill();
            }

            // Neck
            ctx.fillStyle = '#4a2a3a';
            ctx.beginPath();
            ctx.moveTo(25, -10);
            ctx.lineTo(38, -18);
            ctx.lineTo(42, -12);
            ctx.lineTo(28, -5);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#2a1a2a';
            ctx.stroke();

            // Head - more angular and fierce
            ctx.fillStyle = '#5a3a4a';
            ctx.beginPath();
            ctx.moveTo(42, -20);
            ctx.lineTo(55, -22);
            ctx.lineTo(62, -18);
            ctx.lineTo(65, -10);
            ctx.lineTo(62, -5);
            ctx.lineTo(48, -8);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#2a1a2a';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Snout - pointed and dragon-like
            ctx.fillStyle = '#5a3a4a';
            ctx.beginPath();
            ctx.moveTo(62, -18);
            ctx.lineTo(72, -16);
            ctx.lineTo(75, -12);
            ctx.lineTo(72, -10);
            ctx.lineTo(62, -10);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Horns
            ctx.strokeStyle = '#d4af37';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(50, -23);
            ctx.lineTo(45, -32);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(58, -24);
            ctx.lineTo(62, -34);
            ctx.stroke();

            // Eyes - glowing red
            ctx.fillStyle = '#ff3333';
            ctx.beginPath();
            ctx.arc(58, -16, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.arc(57, -15, 1.5, 0, Math.PI * 2);
            ctx.fill();

            // Fire breath glow
            ctx.fillStyle = 'rgba(255, 100, 0, 0.4)';
            ctx.beginPath();
            ctx.arc(72, -12, 20, 0, Math.PI * 2);
            ctx.fill();

            // Wings - angular and membranous like UO style
            const wingY = -12 + Math.sin(wingFlap) * 6;
            const wingX = Math.cos(wingFlap) * 8;
            
            // Left wing
            ctx.fillStyle = 'rgba(58, 30, 50, 0.9)';
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(-15 + wingX, wingY - 18);
            ctx.lineTo(-32 + wingX, wingY - 12);
            ctx.lineTo(-28, 5);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#d4af37';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Right wing
            ctx.fillStyle = 'rgba(58, 30, 50, 0.9)';
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(15 - wingX, wingY - 18);
            ctx.lineTo(32 - wingX, wingY - 12);
            ctx.lineTo(28, 5);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Tail
            ctx.strokeStyle = '#d4af37';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-25, 5);
            ctx.quadraticCurveTo(-35, 8, -40, 15);
            ctx.stroke();

            ctx.restore();
        }

        // Particle effects
        class Particle {
            constructor(x, y, vx, vy, life) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.life = life;
                this.maxLife = life;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // gravity
                this.life--;
            }

            draw(ctx) {
                const alpha = this.life / this.maxLife;
                ctx.fillStyle = `rgba(240, 208, 96, ${alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createExplosion(x, y, count = 30, isVictory = false) {
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const speed = 4 + Math.random() * 3;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed - 2;
                particles.push(new Particle(x, y, vx, vy, 40 + Math.random() * 20));
            }
        }

        // Game Loop
        let animationFrameId;
        let gameLogicInterval = null;

        function multToProgress(m) {
            m = Math.max(0.0, m);
            if (m <= 1)  return 0.10 * m;
            if (m <= 2)  return 0.10 + 0.20 * (m - 1);
            if (m <= 4)  return 0.30 + 0.30 * (m - 2) / (4 - 2);
            if (m <= 8)  return 0.60 + 0.15 * (m - 4) / (8 - 4);
            return Math.min(0.75 + 0.25 * (m - 8) / (32 - 8), 1.0);
        }

        function tickGameLogic() {
            if (!gameState.isRunning || gameState.crashed) return;
            const elapsed = Date.now() - gameState.gameStartTime;
            // Starts at 1.00x, action zone 1-2x (6s), accelerates after
            let _mult;
            if (elapsed < 6000) {
                _mult = 1 + (elapsed / 6000) * 1;            // 1x -> 2x over 6s
            } else if (elapsed < 10000) {
                _mult = 2 + ((elapsed - 6000) / 4000) * 2;  // 2x -> 4x over 4s
            } else if (elapsed < 13000) {
                _mult = 4 + ((elapsed - 10000) / 3000) * 4; // 4x -> 8x over 3s
            } else if (elapsed < 17000) {
                _mult = 8 + ((elapsed - 13000) / 4000) * 24; // 8x -> 32x over 4s
            } else {
                _mult = 32 + ((elapsed - 17000) / 1000) * 10; // 32x+ fast
            }
            gameState.multiplier = _mult;
            updateUI();

            // Cap at 50x if player has a bet -- let dragon fly free if no bet
            const _activeBet = gameState.currentBet > 0;
            const _effectiveCrash = (_activeBet && gameState.crashPoint > 50) ? 50 : gameState.crashPoint;

            if (gameState.multiplier >= _effectiveCrash) {
                const _cp = multToProgress(_effectiveCrash);
                const cx = canvas.width * 0.08 + (canvas.width * 0.88 - canvas.width * 0.08) * _cp;
                const cy = canvas.height * 0.85 - (canvas.height * 0.85 - canvas.height * 0.08) * _cp;
                gameState.crashed = true;
                gameState.crashPoint = _effectiveCrash; // update so crash anim uses right position
                stopFlying();
                playHarpoon();
                startCrashAnimation(cx, cy);
                handleCrash();
            }
        }

        function startGameLogicTick() {
            if (gameLogicInterval) clearInterval(gameLogicInterval);
            gameLogicInterval = setInterval(tickGameLogic, 50);
        }
        function stopGameLogicTick() {
            if (gameLogicInterval) clearInterval(gameLogicInterval);
            gameLogicInterval = null;
        }
        let lastTickTime = 0;

        // Preload background image
        const bgImage = new Image();
        bgImage.src = './crash_bg.jpg';

        // Sounds
        const sndFlying = new Audio('./sound_flying.mp3');
        sndFlying.loop = true;
        sndFlying.volume = 0.6;
        sndFlying.playbackRate = 1.6;
        const sndHarpoon = new Audio('./sound_harpoon.mp3');
        sndHarpoon.volume = 1.0;
        const sndDeath = new Audio('./sound_death.mp3');
        sndDeath.volume = 1.0;

        function playFlying() {
            sndFlying.currentTime = 0;
            sndFlying.play().catch(() => {});
        }
        function stopFlying() {
            sndFlying.pause();
            sndFlying.currentTime = 0;
        }
        function playHarpoon() {
            sndHarpoon.currentTime = 0;
            sndHarpoon.play().catch(() => {});
        }
        function playDeath() {
            sndDeath.currentTime = 0;
            sndDeath.play().catch(() => {});
        }

        // Dead dragon image
        const deadDragonImg = new Image();
        deadDragonImg.src = './dragon_dead.png';

        const platformImg = new Image();
        platformImg.src = './harpoon_platform.png?v=' + Date.now();
        const boltImg = new Image();
        boltImg.src = './harpoon_bolt.png';

        // Crash animation state
        let crashAnim = null;
        let frozenLineX = null; // frozen crash line endpoint when dragon is hit
        let frozenLineY = null;

        function startCrashAnimation(tx, ty) {
            frozenLineX = tx;
            frozenLineY = ty;
            window._boltFired = true;
            window._boltFireFromX = window._barrelTipWorldX;
            window._boltFireFromY = window._barrelTipWorldY;
            const _elapsed = Date.now() - gameState.gameStartTime;
            const _tp = Math.min(_elapsed / 12000, 1.0);
            const _fz = Math.max(1.0, 2.5 - (_tp * 1.5));
            const gx = window._wheelX || canvas.width * 0.82;
            const gy = window._wheelY || canvas.height * 0.35;
            const fromX = window._barrelTipWorldX || gx;
            const fromY = window._barrelTipWorldY || gy;
            crashAnim = {
                frozenZoom: _fz,
                phase: 'harpoon',
                startTime: Date.now(),
                fromX: fromX,
                fromY: fromY,
                targetX: tx,
                targetY: ty,
                deadX: tx,
                deadY: ty,
                deadVY: 0,
                deadAlpha: 1.0
            };
        }

        function drawCrashAnimation() {
            if (!crashAnim) return;
            const now = Date.now();
            const dt = now - crashAnim.startTime;

            if (crashAnim.phase === 'harpoon') {
                const HARPOON_MS = 400;
                const t = Math.min(dt / HARPOON_MS, 1);
                const hx = crashAnim.fromX + (crashAnim.targetX - crashAnim.fromX) * t;
                const hy = crashAnim.fromY + (crashAnim.targetY - crashAnim.fromY) * t;

                // Draw rope/tether from gun pivot to flying bolt
                ctx.save();
                ctx.strokeStyle = 'rgba(180,140,80,0.7)';
                ctx.lineWidth = 2;
                ctx.setLineDash([6, 3]);
                ctx.beginPath();
                ctx.moveTo(crashAnim.fromX, crashAnim.fromY);
                ctx.lineTo(hx, hy);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();

                // Draw bolt flying toward dragon
                if (boltImg.complete && boltImg.naturalWidth > 0) {
                    const tipAngle = Math.atan2(crashAnim.targetY - crashAnim.fromY, crashAnim.targetX - crashAnim.fromX);
                    const bfw = Math.round(canvas.width * (window._boltScale || 0.11));
                    const bfh = Math.round(bfw * 215 / 421);
                    ctx.save();
                    ctx.translate(hx, hy);
                    ctx.rotate(tipAngle + Math.PI);
                    ctx.drawImage(boltImg, -bfw * 0.92, -bfh / 2, bfw, bfh);
                    ctx.restore();
                }

                if (t >= 1) {
                    crashAnim.phase = 'falling';
                    crashAnim.startTime = Date.now();
                    crashAnim.deadVY = -0.5;
                    // playDeath(); // disabled
                }

            } else if (crashAnim.phase === 'falling') {
                // Dead dragon falls slowly nose-first
                crashAnim.deadVY += 0.1;
                crashAnim.deadY += crashAnim.deadVY;
                crashAnim.deadX += 0.3;

                const w = 300;
                const h = Math.round(300 * 780 / 1365);

                ctx.save();
                ctx.globalAlpha = crashAnim.deadAlpha;
                ctx.translate(crashAnim.deadX, crashAnim.deadY);
                ctx.rotate(Math.PI / 4);
                ctx.drawImage(deadDragonImg, -w/2, -h/2, w, h);
                ctx.restore();
                ctx.globalAlpha = 1.0;

                if (crashAnim.deadY > canvas.height * 0.75) {
                    crashAnim.deadAlpha = Math.max(0, crashAnim.deadAlpha - 0.02);
                    if (crashAnim.deadAlpha <= 0) { crashAnim = null; }
                }
            }

            // Multiplier box at hit point -- shown during both phases
            if (frozenLineX !== null) {
                const label = gameState.multiplier.toFixed(2) + 'x';
                const bx = frozenLineX;
                const by = frozenLineY - 60;
                const bw = 160;
                const bh = 52;
                ctx.save();
                ctx.fillStyle = 'rgba(20, 12, 4, 0.82)';
                ctx.strokeStyle = '#d4af37';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.roundRect(bx - bw/2, by - bh/2, bw, bh, 8);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = '#f0d060';
                ctx.font = 'bold 30px Georgia, serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.9)';
                ctx.shadowBlur = 6;
                ctx.fillText(label, bx, by);
                ctx.shadowBlur = 0;
                ctx.restore();
            }
        }


        function drawPlatformAndBolt(aimDragonX, aimDragonY) {
            if (platformImg.complete && platformImg.naturalWidth > 0) {
                const ph = Math.round(canvas.height * (window._platH || 0.60));
                const pw = Math.round(ph * 500 / 1050);
                const px = canvas.width * (window._platX || 0.82) - pw / 2;
                const py = canvas.height * (window._platY || 1.00) - ph;
                ctx.drawImage(platformImg, px, py, pw, ph);
                window._wheelX = px + pw * (window._wheelPctX || 0.50);
                window._wheelY = py + ph * (window._wheelPctY || 0.28);

            }
            if (boltImg.complete && boltImg.naturalWidth > 0) {
                const bw = Math.round(canvas.width * (window._boltScale || 0.20));
                const bh = Math.round(bw * 215 / 421);
                const wx = window._wheelX || canvas.width * 0.82;
                const wy = window._wheelY || canvas.height * 0.35;
                const angle = Math.atan2(aimDragonY - wy, aimDragonX - wx) + Math.PI;
                ctx.save();
                ctx.translate(wx, wy);
                ctx.rotate(angle);
                ctx.drawImage(boltImg, -bw * 0.92, -bh / 2, bw, bh);
                ctx.restore();
                window._barrelTipWorldX = wx + Math.cos(angle - Math.PI) * bw * 0.87;
                window._barrelTipWorldY = wy + Math.sin(angle - Math.PI) * bw * 0.87;
            }
        }

        function gameLoop() {
            // Dark base
            ctx.fillStyle = '#1a1208';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid removed (bg drawn after progress is calculated below)

            // Draw dynamic Y-axis labels based on current visible range
            ctx.fillStyle = '#9a8070';
            ctx.font = 'bold 12px Georgia';
            ctx.textAlign = 'right';
            
            // Calculate the multiplier range visible on screen
            const maxVisibleMultiplier = Math.max(1, gameState.multiplier);
            const minVisibleMultiplier = 1;
            const multiplierRange = maxVisibleMultiplier - minVisibleMultiplier;
            
            // Draw labels - scale them based on current multiplier
            const labelCount = 6;
            for (let i = 0; i <= labelCount; i++) {
                const normalizedY = i / labelCount; // 0 at top, 1 at bottom
                const multiplierAtY = maxVisibleMultiplier - (normalizedY * multiplierRange);
                
                // Map multiplier to canvas Y position
                // Top of canvas shows highest multiplier, bottom shows 1x
                const y = canvas.height * 0.25 - (i / labelCount) * (canvas.height * 0.6);
                
                if (multiplierAtY >= 1) {
                    ctx.fillText(multiplierAtY.toFixed(1) + 'x', canvas.width - 10, y + 4);
                }
            }

            if (!gameState.isRunning && !crashAnim) {
                // Draw background even in waiting state
                ctx.fillStyle = '#1a1208';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                if (bgImage.complete && bgImage.naturalWidth > 0) {
                    const dbgScale = window._bgDebugScale || 1;
                    const srcW = bgImage.naturalWidth / dbgScale;
                    const srcH = bgImage.naturalHeight / dbgScale;
                    const srcX = Math.max(0, Math.min(bgImage.naturalWidth - srcW, (bgImage.naturalWidth - srcW) * (window._bgPanX || 0.30)));
                    const srcY = Math.max(0, Math.min(bgImage.naturalHeight - srcH, (bgImage.naturalHeight - srcH) * (window._bgPanY || 0.85)));
                    ctx.globalAlpha = 0.55;
                    ctx.drawImage(bgImage, srcX, srcY, srcW, srcH, 0, 0, canvas.width, canvas.height);
                    ctx.globalAlpha = 1.0;
                }
                ctx.fillStyle = 'rgba(212, 175, 55, 0.4)';
                ctx.font = 'bold 28px Georgia';
                ctx.textAlign = 'center';
                ctx.fillText('AWAITING ROUND...', canvas.width / 2, canvas.height / 2);
                drawPlatformAndBolt(canvas.width * 0.1, canvas.height * 0.1);
                animationFrameId = requestAnimationFrame(gameLoop);

            }

            // Keep rendering crash animation even after round ends
            if (!gameState.isRunning && crashAnim) {
                ctx.fillStyle = '#1a1208';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                if (bgImage.complete && bgImage.naturalWidth > 0) {
                    const dbgScale = window._bgDebugScale || 1;
                    const srcW = bgImage.naturalWidth / dbgScale;
                    const srcH = bgImage.naturalHeight / dbgScale;
                    const srcX = Math.max(0, Math.min(bgImage.naturalWidth - srcW, (bgImage.naturalWidth - srcW) * (window._bgPanX || 0.30)));
                    const srcY = Math.max(0, Math.min(bgImage.naturalHeight - srcH, (bgImage.naturalHeight - srcH) * (window._bgPanY || 0.85)));
                    ctx.globalAlpha = 0.55;
                    ctx.drawImage(bgImage, srcX, srcY, srcW, srcH, 0, 0, canvas.width, canvas.height);

                drawCrashAnimation();

            // Multiplier is updated by setInterval (tab-safe), just read it here
            const elapsed = Date.now() - gameState.gameStartTime;

            // Dragon always flies at the same fixed speed regardless of crash point
            // Players can NEVER predict crash from dragon speed
            const FLY_DURATION = 12000; // ms to reach top-right corner (always 12 seconds)
            const timeProgress = Math.min(elapsed / FLY_DURATION, 1.0);

            // Smooth ease: slow start, steady middle, gentle ease near top
            const ease = timeProgress < 0.5
                ? 2 * timeProgress * timeProgress
                : 1 - Math.pow(-2 * timeProgress + 2, 2) / 2;

            // Dragon path: custom piecewise -- 2x=30%, 4x=60%, 8x=75%, 32x+=100%
            const startX = canvas.width * 0.05;
            const startY = canvas.height * 0.92;
            const endX   = canvas.width * 0.88;
            const endY   = canvas.height * 0.08;

            // multToProgress moved to top-level scope
            const _logProgress = multToProgress(gameState.multiplier);
            const dragonX = startX + (endX - startX) * _logProgress;
            const dragonY = startY - (startY - endY) * _logProgress;

            // Crash is triggered by setInterval tick (tab-safe), not render loop

            // Progress for curve drawing (same as dragon position)
            const progress = ease;

            // Background: zoom out continuously driven by real time, not multiplier
            // Starts 2.5x zoomed in, keeps pulling back steadily
            // Freeze zoom when dragon is hit
            const bgZoom = (gameState.crashed
                ? (crashAnim ? crashAnim.frozenZoom || 1.0 : 1.0)
                : Math.max(1.0, 2.5 - (_logProgress * 1.5))) * (window._bgDebugScale || 1.0);
            if (bgImage.complete && bgImage.naturalWidth > 0) {
                const srcW = bgImage.naturalWidth / bgZoom;
                const srcH = bgImage.naturalHeight / bgZoom;
                const srcX = Math.max(0, Math.min(bgImage.naturalWidth - srcW, (bgImage.naturalWidth - srcW) * (window._bgPanX || 0.30)));
                const srcY = Math.max(0, Math.min(bgImage.naturalHeight - srcH, (bgImage.naturalHeight - srcH) * (window._bgPanY || 0.85)));
                ctx.globalAlpha = 0.55;

            // Dragon position: follows exponential curve path

        // Betting flow

        function playCashoutSound() {
            try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                if (!AudioCtx) return;
                if (!window._cashoutAudioCtx) window._cashoutAudioCtx = new AudioCtx();
                const ctx = window._cashoutAudioCtx;
                if (ctx.state === 'suspended') ctx.resume();

                const now = ctx.currentTime;
                const master = ctx.createGain();
                master.gain.setValueAtTime(0.0001, now);
                master.gain.exponentialRampToValueAtTime(0.42, now + 0.015);
                master.gain.exponentialRampToValueAtTime(0.0001, now + 1.6);
                master.connect(ctx.destination);

                const coinTimes = [0, 0.07, 0.14, 0.23, 0.34];
                const coinFreqs = [1800, 2100, 2400, 2200, 2600];
                coinTimes.forEach((t, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(coinFreqs[i], now + t);
                    osc.frequency.exponentialRampToValueAtTime(coinFreqs[i] * 0.65, now + t + 0.08);
                    gain.gain.setValueAtTime(0.0001, now + t);
                    gain.gain.exponentialRampToValueAtTime(0.16, now + t + 0.008);
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + t + 0.09);
                    osc.connect(gain);
                    gain.connect(master);
                    osc.start(now + t);
                    osc.stop(now + t + 0.1);
                });

                const fanfare = [784, 1046.5, 1318.5];
                fanfare.forEach((freq, i) => {

                    gain.connect(master);
                    osc.start(now + 0.18 + i * 0.11);

        const name = row.querySelector('.name')?.textContent?.trim() || 'Unknown';
        const amountText = row.querySelector('.amount')?.textContent?.trim() || '';
        const multiplierText = row.querySelector('.mult')?.textContent?.trim() || '';
        const lossText = row.querySelector('.loss-text')?.textContent?.trim() || '';
        const isLoss = row.classList.contains('player-action-loss') || amountText.startsWith('-');
        return {
          name,
          result: isLoss ? 'loss' : 'cashout',
          amountText,
          multiplierText,
          detailText: isLoss ? lossText : 'cashed out'
        };
      });
      return players.length ? { players } : null;
    },
    pollMs: 700
  });
}
</script>
